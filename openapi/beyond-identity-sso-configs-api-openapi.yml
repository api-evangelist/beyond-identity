      type: object
      description: 'An identity is a unique identifier that may be used by an end-user to gain access governed by Beyond Identity.

        '
      properties:
        id:
          type: string
          description: 'A unique identifier for the identity. This is automatically generated on creation. This field is immutable and read-only. This field is unique within the realm.

            '
          readOnly: true
          example: e372db224c06e850
        realm_id:
          type: string
          description: 'A unique identifier for the identity''s realm. This is automatically set on creation. This field is immutable and read-only.

            '
          readOnly: true
          example: 8f5bec58229e6f29
        tenant_id:
          type: string
          description: 'A unique identifier for the identity''s tenant. This is automatically set on creation. This field is immutable and read-only.

            '
          readOnly: true
          example: 0001f1f460b1ace6
        display_name:
          type: string
          minLength: 1
          maxLength: 64
          pattern: ^[^{}[\]<>;:?\\/|*^%$#=~`!]*$
          description: 'A human-readable name for the identity. This name is used for display purposes.

            '
          example: Test Display
        create_time:
          type: string
          format: date-time
          description: 'A time value given in ISO8601 combined date and time format that represents when the identity was created. This is automatically generated on creation. This field is read-only.

            '
          readOnly: true
          example: '2022-04-12T05:53:07.119Z'
        update_time:
          type: string
          format: date-time
          description: 'A time value given in ISO8601 combined date and time format that represents when the identity was last updated. This is automatically updated when the identity is updated. This field is read-only.

            '
          readOnly: true
          example: '2022-06-16T14:31:03.770Z'
        status:
          type: string
          description: 'Indicator for the identity''s administrative status.  If ''active'', the identity is able to generate passkeys and login.  If ''suspended'', the identity is unable to generate passkeys or login.

            '
          example: active
        traits:
          description: 'A collection of properties to describe an identity. All traits contain a `type` key which describes the specific traits schema.

            '
          oneOf:
          - $ref: '#/components/schemas/Traits_v0'
          discriminator:
            propertyName: type
            mapping:
              traits_v0: '#/components/schemas/Traits_v0'
        enrollment_status:
          type: string
          enum:
          - ENROLLED
          - PENDING
          - INVITE_FAILED
          - UNENROLLED
          description: 'Indicator for the identity''s enrollment status.


            If ''ENROLLED'', the identity has 1 or more active passkeys.

            If ''PENDING'', the identity has no active passkeys and 1 or more pending enrollments.

            If ''INVITE_FAILED'', the identity has no active passkeys, no pending enrollments, and 1 or more failed enrollments.

            If ''UNENROLLED'', the identity is not enrolled in the organization.


            May be undefined. This field is output-only.

            '
          example: ENROLLED
          readOnly: true
