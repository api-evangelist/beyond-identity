                        inbound_scim:
                          $ref: '#/paths/~1v1~1tenants~1%7Btenant_id%7D~1realms~1%7Brealm_id%7D~1sso-configs/post/responses/200/content/application~1json/schema/properties/payload/oneOf/8/allOf/0'
                        application_id:
                          type: string
                        authenticator_config_id:
                          type: string
                    - type: object
