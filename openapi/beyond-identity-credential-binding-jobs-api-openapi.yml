                          failed_permanently: false
                    job_template:
                      authenticator_config_id: 67bb0acf12e5c899
                      post_binding_redirect_uri: http://example.com/callback
                    create_time: '2022-03-14T03:42:52.905657Z'
                    update_time: '2022-03-15T05:55:23.823187Z'
