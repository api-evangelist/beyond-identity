apis:
  - aid: beyond-identity-secure-access-api
    name: Beyond Identity Secure Access API
    description: >
      The Beyond Identity Secure Access API provides resource-oriented REST endpoints
      for managing the full lifecycle of passwordless authentication infrastructure.
      Resources include tenants, realms, groups, identities, credentials, credential
      binding jobs, applications, authenticator configurations, identity providers,
      SSO configs, resource servers, roles, tokens, and SCIM user/group endpoints.
      All endpoints require OAuth 2.0 bearer token authentication via client
      credentials or authorization code flows.
    humanURL: https://developer.beyondidentity.com/api/v1
    baseURL: https://api-us.beyondidentity.com
    tags:
      - Authentication
      - Identity Management
      - Passkeys
      - Credentials
      - SCIM
      - Tenants
      - Realms
    properties:
