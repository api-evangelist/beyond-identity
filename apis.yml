aid: beyond-identity
name: Beyond Identity
description: >
  Beyond Identity is a zero-trust passwordless authentication platform that eliminates
  passwords by binding credentials to physical devices using platform authenticators
  and cryptographic passkeys. The platform provides REST APIs for managing tenants,
  realms, identities, and device-bound credentials across workforce and customer
  identity use cases. Beyond Identity supports continuous risk assessment with
  device security signals, policy enforcement, and just-in-time access controls.
  The platform integrates with SCIM, OIDC, and OAuth 2.0 standards and offers
  multi-region deployment including US, EU, and FedRAMP environments.
type: Index
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
