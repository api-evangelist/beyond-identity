        url: examples/beyond-identity-credential-binding-job-example.json
  - aid: beyond-identity-next-gen-api
    name: Beyond Identity Next Generation API
    description: >
      The Next Generation Beyond Identity API provides the latest version of
      the platform's REST endpoints including updated identity management,
      credential binding, continuous risk assessment, and policy enforcement
      capabilities. Supports the same OAuth 2.0 authentication as the Secure
      Access API with region-specific base URLs for US and EU deployments.
    humanURL: https://docs.beyondidentity.com/api/v1
    baseURL: https://api-us.beyondidentity.com
